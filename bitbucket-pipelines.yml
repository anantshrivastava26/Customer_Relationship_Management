image: python:3.11

pipelines:
  default:
    - step:
        name: Backend validation
        caches:
          - pip
        script:
          - cd backend
          - pip install -r requirements.txt
          - python -m compileall app ml
    - step:
        name: Frontend build
        image: node:20
        caches:
          - node
        script:
          - cd frontend
          - npm ci
          - npm run build
