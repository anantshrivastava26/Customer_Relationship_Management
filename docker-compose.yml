services:
  backend:
    build:
      context: ./backend
    environment:
      DATASET_PATH: /workspace/online_retail_listing.csv
      CORS_ORIGINS: http://localhost:5173
      MLFLOW_TRACKING_URI: file:/workspace/mlruns
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
